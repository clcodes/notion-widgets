<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, sans-serif;
    color: inherit;
}

.wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    padding: 10px;
}

.card {
    text-align: center;
    background: transparent;
}

.city {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    opacity: 0.7;
    margin-bottom: 4px;
}

.time {
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
}

.date {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="wrap">

    <div class="card">
        <div class="city">PERTH</div>
        <div class="time" id="perth-time"></div>
        <div class="date" id="perth-date"></div>
    </div>

    <div class="card">
        <div class="city">MUMBAI</div>
        <div class="time" id="mumbai-time"></div>
        <div class="date" id="mumbai-date"></div>
    </div>

</div>

<script>
function updateTime() {

    const locations = [
        {
            id: "perth",
            timezone: "Australia/Perth"
        },
        {
            id: "mumbai",
            timezone: "Asia/Kolkata"
        }
    ];

    locations.forEach(location => {

        const now = new Date();

        document.getElementById(location.id + "-time").textContent =
            now.toLocaleTimeString("en-AU", {
                timeZone: location.timezone,
                hour: "2-digit",
                minute: "2-digit",
                hour12: false
            });

        document.getElementById(location.id + "-date").textContent =
            now.toLocaleDateString("en-AU", {
                timeZone: location.timezone,
                weekday: "short",
                day: "numeric",
                month: "short"
            });

    });
}

updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
